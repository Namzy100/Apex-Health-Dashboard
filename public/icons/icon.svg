<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#0b0b0d"/>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#0b0b0d" opacity="0.88"/>
  <!-- Amber "A" glyph -->
  <text x="256" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="300" font-weight="900" text-anchor="middle" fill="#f59e0b">A</text>
  <!-- Subtle amber glow ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#f59e0b" stroke-width="4" opacity="0.15"/>
</svg>
